<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>OG Batch Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Archivo', sans-serif;
    background: #FBF7F0;
    color: #0A0A0A;
    position: relative;
  }
  .stripe {
    position: absolute; top: 0; left: 0; right: 0; height: 14px;
    background: linear-gradient(90deg, #00B2A9 0%, #00B2A9 33.33%, #EF426F 33.33%, #EF426F 66.66%, #FF8200 66.66%, #FF8200 100%);
  }
  .bottom-stripe {
    position: absolute; bottom: 0; left: 0; right: 0; height: 14px;
    background: linear-gradient(90deg, #00B2A9 0%, #00B2A9 33.33%, #EF426F 33.33%, #EF426F 66.66%, #FF8200 66.66%, #FF8200 100%);
  }
  .container {
    display: flex;
    width: 100%;
    height: 100%;
    padding: 60px 60px;
    align-items: center;
    gap: 50px;
  }
  .photo-wrap {
    width: 320px;
    height: 440px;
    flex-shrink: 0;
    border-radius: 20px;
    overflow: hidden;
    background: #0A0A0A;
    position: relative;
  }
  .photo-wrap.shadow-fuchsia { box-shadow: 8px 8px 0 #EF426F; }
  .photo-wrap.shadow-teal    { box-shadow: 8px 8px 0 #00B2A9; }
  .photo-wrap.shadow-orange  { box-shadow: 8px 8px 0 #FF8200; }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: contrast(1.05) saturate(1.1);
  }
  .text-block { flex: 1; min-width: 0; }
  .kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #6E6E6E;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .kicker.dot-fuchsia::before { background: #EF426F; }
  .kicker.dot-teal::before    { background: #00B2A9; }
  .kicker.dot-orange::before  { background: #FF8200; }
  .kicker::before {
    content: "";
    width: 12px; height: 12px; border-radius: 50%;
    background: #EF426F;
  }
  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 64px;
    line-height: .95;
    letter-spacing: -.035em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  h1.size-md { font-size: 56px; }
  h1.size-sm { font-size: 50px; }
  h1 .accent-fuchsia { color: #EF426F; }
  h1 .accent-teal    { color: #00B2A9; }
  h1 .accent-orange  { color: #FF8200; }
  .tagline {
    font-family: 'Archivo', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: #3A3A3A;
    line-height: 1.35;
    max-width: 620px;
  }
  .url {
    position: absolute;
    bottom: 38px; right: 60px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #0A0A0A;
    display: flex; align-items: center; gap: 8px;
  }
  .url::before {
    content: "→";
    color: #EF426F;
  }
</style>
</head>
<body>
  <div class="stripe"></div>
  <div class="container">
    <div class="photo-wrap" id="photo-wrap">
      <img src="../photos/A7100670.jpg" alt="Jérémy Sagnier" id="photo-img">
    </div>
    <div class="text-block">
      <div class="kicker" id="kicker">Article · jerwis.fr</div>
      <h1 id="title">Titre</h1>
      <p class="tagline" id="tagline">Sous-titre</p>

  </div>
  <div class="url">jerwis.fr</div>
  <div class="bottom-stripe"></div>

const params = new URLSearchParams(location.search);
const slug = params.get("slug");
const data = COVERS[slug];

if (data) {
  document.getElementById("kicker").innerHTML = data.kicker;
  document.getElementById("kicker").classList.add("dot-" + data.accent);
  const h1 = document.getElementById("title");
  h1.innerHTML = data.h1;
  if (data.size) h1.classList.add("size-" + data.size);
  document.getElementById("tagline").textContent = data.tagline;
  document.getElementById("photo-wrap").classList.add("shadow-" + data.accent);
} else {
  document.getElementById("title").textContent = "Slug inconnu : " + slug;
}
</script>
</body>
</html>
